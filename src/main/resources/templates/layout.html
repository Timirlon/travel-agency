<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Travel Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Travel Agency</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:text="#{layout.home}"></a>
                </li>

<!--                <li class="nav-item" sec:authorize="hasRole('ADMIN')">-->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vouchers}" th:text="#{layout.vouchers}"></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/vouchers/myVouchers" th:text="#{layout.myVouchers}"></a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/users}" th:text="#{layout.users}"></a>
                </li>

            </ul>


            <form class="me-3">
                <select id="locales" class="form-select form-select-sm">
                    <option value="en" th:text="#{lang.eng}">EN</option>
                    <option value="kk" th:text="#{lang.kk}">KK</option>
                </select>
            </form>

            <div sec:authorize="isAuthenticated()">
                <a class="me-2 fw-bold text-success text-decoration-none"
                   th:href="@{/account}"
                   th:text="${#authentication.name}">Username</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-outline-danger btn-sm"  th:text="#{layout.logout}"></button>
                </form>
            </div>

            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-outline-success me-2" th:text="#{layout.signIn}"></a>
                <a th:href="@{/register}" class="btn btn-outline-secondary btn-sm" th:text="#{layout.signUp}"></a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4" layout:fragment="content">
    <p>Default content</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const selector = document.getElementById("locales");
        const currentLang = new URLSearchParams(window.location.search).get("lang");
        if (currentLang) selector.value = currentLang;

        selector.addEventListener("change", function () {
            const selectedLang = this.value;
            const params = new URLSearchParams(window.location.search);
            params.set("lang", selectedLang);
            window.location.search = params.toString();
        });
    });
</script>
</body>
</html>
