<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <h2 th:text="#{users.title}">Registered Users</h2>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/users}" method="get" class="mb-3">
            <div class="input-group">
                <input type="text" class="form-control" name="username" th:placeholder="#{users.searchByUsername}"
                       th:value="${searchedUsername}">
                <button class="btn btn-primary" type="submit" th:text="#{users.search}">Search</button>
            </div>
        </form>

        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{users.username}">Username</th>
                <th th:text="#{users.role}">Role</th>
                <th th:text="#{users.number}">Number</th>
                <th th:text="#{users.balance}">Balance</th>
                <th th:text="#{users.active}">Active</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <form th:action="@{'/users/update/' + ${user.id}}" method="post">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td>
                        <select name="role" class="form-select form-select-sm">
                            <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                            <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                            <option value="MANAGER" th:selected="${user.role == 'MANAGER'}">MANAGER</option>
                        </select>
                    </td>
                    <td th:text="${user.phoneNumber}"></td>
                    <td th:text="${user.balance}"></td>
                    <td class="text-center">
                        <input type="checkbox" name="active" th:checked="${user.active}" />
                    </td>
                    <td>
                        <button type="submit" class="btn btn-sm btn-success">Save</button>
                    </td>
                </form>
            </tr>
            </tbody>
        </table>

        <nav th:if="${page.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/users(page=${page.number - 1}, username=${searchedUsername})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                    th:classappend="${page.number == i} ? 'active'">
                    <a class="page-link"
                       th:href="@{/users(page=${i}, username=${searchedUsername})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/users(page=${page.number + 1}, username=${searchedUsername})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
